<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>季節互動遊戲 - 春天與夏天</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    font-family: "Microsoft JhengHei", "PingFang TC", "Heiti TC", sans-serif;
    background: #222;
    overflow: hidden;
    user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 16:9 舞台 */
  .stage-wrap {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stage {
    width: 1600px;
    height: 900px;
    transform-origin: center center;
    background: linear-gradient(135deg, #fff9c4 0%, #b3e5fc 100%);
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
  }

  .page {
    position: absolute;
    inset: 0;
    display: none;
    padding: 30px 50px;
    flex-direction: column;
  }
  .page.active { display: flex; }

  /* 開始頁 */
  #startPage {
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  #startPage h1 {
    font-size: 110px;
    color: #e65100;
    margin-bottom: 30px;
    text-shadow: 4px 4px 0 #fff;
  }
  #startPage p {
    font-size: 48px;
    color: #4a4a4a;
    margin-bottom: 60px;
  }
  .start-btn {
    font-size: 56px;
    padding: 30px 100px;
    background: #ff9800;
    color: white;
    border: 8px solid #fff;
    border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 10px 0 #e65100;
    transition: transform 0.1s;
  }
  .start-btn:hover { transform: scale(1.05); }
  .start-btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #e65100; }

  /* 標題列 */
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    flex-shrink: 0;
  }
  .progress {
    background: white;
    padding: 14px 32px;
    border-radius: 25px;
    font-size: 32px;
    color: #1565c0;
    border: 5px solid #64b5f6;
  }
  .header {
    background: white;
    padding: 18px 40px;
    border-radius: 25px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    border: 5px solid #ffb74d;
    flex: 1;
    margin-left: 25px;
    text-align: center;
  }
  .header h2 {
    font-size: 44px;
    color: #d84315;
  }
  .sub {
    font-size: 26px;
    color: #6d4c41;
    margin-top: 5px;
  }

  /* 主題圖 + 題目並排 */
  .question-area {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 30px;
    flex: 1;
    min-height: 0;
  }
  .season-pic {
    background: white;
    border-radius: 30px;
    padding: 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    border: 7px solid #fff;
    display: flex;
    flex-direction: column;
  }
  .season-pic svg {
    width: 100%;
    flex: 1;
    min-height: 0;
    display: block;
    border-radius: 22px;
  }
  .season-pic .season-label {
    font-size: 44px;
    font-weight: bold;
    text-align: center;
    margin-top: 15px;
    padding: 10px;
    border-radius: 18px;
    flex-shrink: 0;
  }
  .season-pic.spring { border-color: #f8bbd0; }
  .season-pic.spring .season-label { background: #fce4ec; color: #c2185b; }
  .season-pic.summer { border-color: #ffe082; }
  .season-pic.summer .season-label { background: #fff8e1; color: #ef6c00; }
  .season-pic.autumn { border-color: #ffcc80; }
  .season-pic.autumn .season-label { background: #fff3e0; color: #bf360c; }
  .season-pic.winter { border-color: #b3e5fc; }
  .season-pic.winter .season-label { background: #e1f5fe; color: #01579b; }

  /* 右側內容 */
  .right-side {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 20px;
    flex: 1;
    min-height: 0;
  }
  .card {
    background: white;
    border: 7px solid #fff;
    border-radius: 28px;
    padding: 12px;
    cursor: pointer;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
  .card.correct {
    border-color: #4caf50;
    background: #c8e6c9;
    pointer-events: none;
  }
  .card.wrong {
    border-color: #f44336;
    background: #ffcdd2;
    animation: shake 0.4s;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }
  .card .pic {
    font-size: 110px;
    line-height: 1;
    margin-bottom: 8px;
  }
  .card .label {
    font-size: 36px;
    color: #424242;
    font-weight: bold;
  }
  .mark {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 56px;
    display: none;
  }
  .card.correct .mark.tick { display: block; }
  .card.wrong .mark.cross { display: block; }

  .next-btn {
    font-size: 40px;
    padding: 18px 60px;
    background: #4caf50;
    color: white;
    border: 6px solid #fff;
    border-radius: 28px;
    cursor: pointer;
    box-shadow: 0 7px 0 #2e7d32;
    margin-top: 18px;
    align-self: flex-end;
    visibility: hidden;
  }
  .next-btn.show { visibility: visible; }
  .next-btn:active { transform: translateY(4px); box-shadow: 0 3px 0 #2e7d32; }

  /* 完成頁 */
  #endPage {
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  #endPage h1 {
    font-size: 110px;
    color: #d81b60;
    margin-bottom: 20px;
  }
  #endPage .stars {
    font-size: 130px;
    margin: 10px 0 25px;
  }
  #endPage p {
    font-size: 44px;
    color: #4a148c;
    margin: 10px 0;
  }
  #endPage .restart {
    margin-top: 35px;
  }

  /* 提示動畫 */
  .feedback {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 140px;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    background: rgba(255,255,255,0.92);
    padding: 25px 70px;
    border-radius: 35px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  }
  .feedback.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.15);
  }
</style>
</head>

        <button class="next-btn" id="next3" onclick="goPage('q4Page')">下一題 ▶</button>
      </div>
    </div>
  </div>

  <!-- 第四頁：冬天 -->
  <div id="q4Page" class="page">
    <div class="top-row">
      <div class="progress">第 4 題 / 共 4 題</div>
      <div class="header">
        <h2>❄️ 下列哪些事物會在冬天出現？</h2>
        <div class="sub">請點選正確的圖片（可選多個）</div>
      </div>
    </div>
    <div class="question-area">
      <div class="season-pic winter">
        <svg viewBox="0 0 300 320" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="skyW" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#90caf9"/>
              <stop offset="100%" stop-color="#e1f5fe"/>
            </linearGradient>
            <linearGradient id="snowW" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="100%" stop-color="#e1f5fe"/>
            </linearGradient>
          </defs>
          <!-- 天空 -->
          <rect width="300" height="220" fill="url(#skyW)"/>
          <!-- 太陽（淡） -->
          <circle cx="245" cy="55" r="22" fill="#fff9c4" opacity="0.85"/>
          <!-- 雲 -->
          <ellipse cx="70" cy="55" rx="28" ry="13" fill="#eceff1"/>
          <ellipse cx="90" cy="48" rx="22" ry="13" fill="#eceff1"/>
          <ellipse cx="170" cy="80" rx="25" ry="11" fill="#eceff1"/>
          <!-- 雪花飄落 -->
          <g fill="#fff" stroke="#b3e5fc" stroke-width="0.5">
            <text x="50" y="100" font-size="16">❄</text>
            <text x="120" y="130" font-size="14">❄</text>
            <text x="200" y="110" font-size="18">❄</text>
            <text x="160" y="170" font-size="14">❄</text>
            <text x="80" y="180" font-size="16">❄</text>
            <text x="240" y="160" font-size="14">❄</text>
            <text x="30" y="160" font-size="14">❄</text>
            <text x="270" y="200" font-size="14">❄</text>
          </g>
          <!-- 雪地 -->
          <path d="M0,220 Q150,200 300,220 L300,320 L0,320 Z" fill="url(#snowW)"/>
          <!-- 光禿樹 -->
          <rect x="42" y="140" width="12" height="85" fill="#4e342e"/>
          <line x1="48" y1="160" x2="25" y2="135" stroke="#4e342e" stroke-width="4" stroke-linecap="round"/>
          <line x1="48" y1="155" x2="72" y2="130" stroke="#4e342e" stroke-width="4" stroke-linecap="round"/>
          <line x1="48" y1="175" x2="20" y2="170" stroke="#4e342e" stroke-width="3" stroke-linecap="round"/>
          <line x1="48" y1="170" x2="78" y2="165" stroke="#4e342e" stroke-width="3" stroke-linecap="round"/>
          <!-- 樹上積雪 -->
          <ellipse cx="25" cy="135" rx="6" ry="3" fill="#fff"/>
          <ellipse cx="72" cy="130" rx="6" ry="3" fill="#fff"/>
          <!-- 雪人 -->
          <g transform="translate(170,250)">
            <!-- 身 -->
            <circle cx="0" cy="0" r="28" fill="#fff" stroke="#b3e5fc" stroke-width="1.5"/>
            <!-- 頭 -->
            <circle cx="0" cy="-35" r="20" fill="#fff" stroke="#b3e5fc" stroke-width="1.5"/>
            <!-- 帽 -->
            <rect x="-15" y="-58" width="30" height="6" fill="#d32f2f"/>
            <rect x="-12" y="-72" width="24" height="14" fill="#d32f2f"/>
            <!-- 眼 -->
            <circle cx="-6" cy="-37" r="2" fill="#212121"/>
            <circle cx="6" cy="-37" r="2" fill="#212121"/>
            <!-- 鼻（紅蘿蔔） -->
            <polygon points="0,-32 8,-30 0,-28" fill="#ff6f00"/>
            <!-- 嘴 -->
            <circle cx="-4" cy="-25" r="1" fill="#212121"/>
            <circle cx="0" cy="-24" r="1" fill="#212121"/>
            <circle cx="4" cy="-25" r="1" fill="#212121"/>
            <!-- 鈕扣 -->
            <circle cx="0" cy="-8" r="2.5" fill="#5d4037"/>
            <circle cx="0" cy="2" r="2.5" fill="#5d4037"/>
            <circle cx="0" cy="12" r="2.5" fill="#5d4037"/>
            <!-- 手（樹枝） -->
            <line x1="-25" y1="-5" x2="-45" y2="-15" stroke="#4e342e" stroke-width="3" stroke-linecap="round"/>
            <line x1="25" y1="-5" x2="45" y2="-15" stroke="#4e342e" stroke-width="3" stroke-linecap="round"/>
            <!-- 頸巾 -->
            <rect x="-18" y="-22" width="36" height="6" fill="#1976d2"/>
            <rect x="10" y="-22" width="6" height="20" fill="#1976d2"/>
          </g>
          <!-- 地上雪堆 -->
          <ellipse cx="60" cy="290" rx="35" ry="10" fill="#fff" opacity="0.9"/>
          <ellipse cx="260" cy="295" rx="40" ry="12" fill="#fff" opacity="0.9"/>
        </svg>
        <div class="season-label">❄️ 冬 天 ❄️</div>
      </div>
      <div class="right-side">
        <div class="grid" id="q4Grid"></div>
        <button class="next-btn" id="next4" onclick="goPage('endPage')">完成 ✓</button>
      </div>
    </div>
  </div>

  <!-- 完成頁 -->
  <div id="endPage" class="page">
    <h1>🎉 完成喇！🎉</h1>
    <div class="stars">⭐ ⭐ ⭐</div>
    <p>你做得非常好！</p>
    <p>你已經認識咗春、夏、秋、冬四季嘅特徵 👏</p>
    <button class="start-btn restart" onclick="restart()">再玩一次 🔄</button>
  </div>

  <!-- 答對/答錯提示 -->
  <div class="feedback" id="feedback"></div>

</div>
</div>

<script>
  // 自動將 1600x900 舞台縮放至視窗大小
  function fitStage() {
    const stage = document.getElementById('stage');
    const sx = window.innerWidth / 1600;
    const sy = window.innerHeight / 900;
    const s = Math.min(sx, sy);
    stage.style.transform = `scale(${s})`;
  }
  window.addEventListener('resize', fitStage);
  window.addEventListener('load', fitStage);
  fitStage();

  // 春天題目
  const q1Items = [
    { pic: '🌸', label: '花朵', correct: true },
    { pic: '❄️', label: '雪', correct: false },
    { pic: '🍂', label: '黃葉', correct: false },
    { pic: '🌱', label: '綠草', correct: true },
    { pic: '🐛', label: '昆蟲', correct: true },
    { pic: '🌧️', label: '下雨', correct: true }
  ];

  // 夏天題目
  const q2Items = [
    { pic: '👙', label: '泳衣', correct: true },
    { pic: '🍦', label: '雪糕', correct: true },
    { pic: '❄️', label: '雪', correct: false },
    { pic: '🧥', label: '毛衣', correct: false },
    { pic: '👕', label: '短袖衫', correct: true },
    { pic: '🩳', label: '短褲', correct: true }
  ];

  // 秋天題目 - 正確：紅葉、黃葉、月餅、風箏；錯誤：花朵、西瓜
  const q3Items = [
    { pic: '🍁', label: '紅葉', correct: true },
    { pic: '🍂', label: '黃葉', correct: true },
    { pic: '🌸', label: '花朵', correct: false },
    { pic: '🥮', label: '月餅', correct: true },
    { pic: '🪁', label: '風箏', correct: true },
    { pic: '🍉', label: '西瓜', correct: false }
  ];

  // 冬天題目 - 正確：雪、雪人、毛衣、頸巾；錯誤：泳衣、蝴蝶
  const q4Items = [
    { pic: '❄️', label: '雪', correct: true },
    { pic: '⛄', label: '雪人', correct: true },
    { pic: '👙', label: '泳衣', correct: false },
    { pic: '🧥', label: '毛衣', correct: true },
    { pic: '🧣', label: '頸巾', correct: true },
    { pic: '🦋', label: '蝴蝶', correct: false }
  ];

  function buildGrid(gridId, items, nextBtnId) {
    const grid = document.getElementById(gridId);
    grid.innerHTML = '';
    let totalCorrect = items.filter(i => i.correct).length;
    let foundCorrect = 0;

    items.forEach((item) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="pic">${item.pic}</div>
        <div class="label">${item.label}</div>
        <div class="mark tick">✅</div>
        <div class="mark cross">❌</div>
      `;
      card.onclick = () => {
        if (card.classList.contains('correct')) return;
        if (item.correct) {
          card.classList.remove('wrong');
          card.classList.add('correct');
          showFeedback('😊 答啱喇！', '#4caf50');
          foundCorrect++;
          if (foundCorrect === totalCorrect) {
            setTimeout(() => {
              document.getElementById(nextBtnId).classList.add('show');
            }, 600);
          }
        } else {
          card.classList.add('wrong');
          showFeedback('😅 再試吓', '#f44336');
          setTimeout(() => card.classList.remove('wrong'), 800);
        }
      };
      grid.appendChild(card);
    });
  }

  function showFeedback(text, color) {
    const fb = document.getElementById('feedback');
    fb.textContent = text;
    fb.style.color = color;
    fb.classList.add('show');
    setTimeout(() => fb.classList.remove('show'), 800);
  }

  function goPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'q1Page') buildGrid('q1Grid', q1Items, 'next1');
    if (id === 'q2Page') buildGrid('q2Grid', q2Items, 'next2');
    if (id === 'q3Page') buildGrid('q3Grid', q3Items, 'next3');
    if (id === 'q4Page') buildGrid('q4Grid', q4Items, 'next4');
  }

  function restart() {
    ['next1','next2','next3','next4'].forEach(id => {
      document.getElementById(id).classList.remove('show');
    });
    goPage('startPage');
  }
</script>

</body>
</html>
